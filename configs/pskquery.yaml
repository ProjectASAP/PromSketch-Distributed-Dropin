pskquery:
  server:
    listen_address: ":8480"
    read_timeout: 60s
    write_timeout: 60s
  cluster:
    total_partitions: 16
    replication_factor: 2
    discovery:
      type: "static"
      static_nodes:
        - id: "psksketch-1"
          address: "psksketch-1:8481"
          partition_start: 0
          partition_end: 6
        - id: "psksketch-2"
          address: "psksketch-2:8481"
          partition_start: 6
          partition_end: 12
        - id: "psksketch-3"
          address: "psksketch-3:8481"
          partition_start: 12
          partition_end: 16
  backend:
    type: "victoriametrics"
    url: "http://victoriametrics:8428"
    timeout: 60s
  query:
    enable_fallback: true
    fallback_timeout: 60s
    query_timeout: 30s
    max_concurrent_queries: 100
    approximation:
      epsilon: 0.02
      confidence: 0.95
