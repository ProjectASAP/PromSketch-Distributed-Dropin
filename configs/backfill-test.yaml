# PromSketch-Dropin Configuration for Backfill Testing

server:
  listen_address: ":9100"
  read_timeout: 30s
  write_timeout: 30s
  log_level: info
  log_format: logfmt

ingestion:
  remote_write:
    enabled: true
    listen_address: ":9100"
    max_sample_size: 5000000
  scrape:
    enabled: false

backend:
  type: victoriametrics
  url: http://localhost:8428
  remote_write_url: http://localhost:8428/api/v1/write
  timeout: 30s
  max_retries: 3
  batch_size: 1000
  flush_interval: 5s

sketch:
  num_partitions: 16
  memory_limit: "2GB"
  defaults:
    eh_params:
      window_size: 1800
      k: 50
      kll_k: 256
  targets:
    - match: '{__name__=~"http_request_duration_.*"}'
      eh_params:
        window_size: 3600
        k: 50
        kll_k: 256
    - match: '{__name__="node_cpu_seconds_total"}'
      eh_params:
        window_size: 7200
    - match: '{job="api"}'
      eh_params:
        window_size: 1800

query:
  listen_address: ":9100"
  timeout: 30s
  max_concurrency: 20
  enable_fallback: true
  fallback_timeout: 60s
