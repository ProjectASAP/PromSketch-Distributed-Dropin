server:
  listen_address: ":9100"
  log_level: info

ingestion:
  remote_write:
    enabled: true
    listen_address: ":9100"

backend:
  type: victoriametrics
  url: http://localhost:8428
  remote_write_url: http://localhost:8428/api/v1/write
  timeout: 30s
  batch_size: 1000
  flush_interval: 5s

sketch:
  num_partitions: 16

  defaults:
    eh_params:
      window_size: 1800  # 30 minutes
      k: 50
      kll_k: 256

  targets:
    - match: 'prometheus_http_requests_total'
    - match: 'http_.*_duration'
    - match: '{job="api"}'