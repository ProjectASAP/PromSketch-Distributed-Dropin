syntax = "proto3";

package psksketch.v1;

option go_package = "github.com/promsketch/promsketch-dropin/api/psksketch/v1;psksketchpb";

// SketchService provides distributed sketch operations
service SketchService {
  // Insert a sample into the sketch storage
  rpc Insert(InsertRequest) returns (InsertResponse);

  // BatchInsert inserts multiple samples in one RPC call
  rpc BatchInsert(BatchInsertRequest) returns (BatchInsertResponse);

  // LookUp checks if a query can be answered by sketches
  rpc LookUp(LookUpRequest) returns (LookUpResponse);

  // Eval executes a sketch query and returns results
  rpc Eval(EvalRequest) returns (EvalResponse);

  // Health returns the health status of this node
  rpc Health(HealthRequest) returns (HealthResponse);

  // Stats returns node statistics
  rpc Stats(StatsRequest) returns (StatsResponse);
}

message Label {
  string name = 1;
  string value = 2;
}

message InsertRequest {
  repeated Label labels = 1;
  int64 timestamp = 2;
  double value = 3;
}

message InsertResponse {
  bool success = 1;
  string error = 2;
}

message BatchInsertRequest {
  repeated TimeSeries time_series = 1;
}

message TimeSeries {
  repeated Label labels = 1;
  repeated Sample samples = 2;
}

message BatchInsertResponse {
  int64 inserted = 1;
  int64 failed = 2;
  string error = 3;
}

message LookUpRequest {
  repeated Label labels = 1;
  string func_name = 2;
  int64 min_time = 3;
  int64 max_time = 4;
}

message LookUpResponse {
  bool can_answer = 1;
}

message EvalRequest {
  string func_name = 1;
  repeated Label labels = 2;
  double other_args = 3;
  int64 min_time = 4;
  int64 max_time = 5;
  int64 cur_time = 6;
}

message Sample {
  int64 timestamp = 1;
  double value = 2;
}

// EvalResultSeries pairs a matched series' full labels with its computed samples.
message EvalResultSeries {
  repeated Label labels = 1;
  repeated Sample samples = 2;
}

message EvalResponse {
  repeated Sample samples = 1;      // deprecated: flat samples (no labels)
  string error = 2;
  repeated EvalResultSeries series = 3;  // per-series results with full labels
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string version = 2;
  string node_id = 3;
  int64 uptime_seconds = 4;
}

message StatsRequest {}

message StatsResponse {
  string node_id = 1;
  uint64 total_series = 2;
  uint64 sketched_series = 3;
  uint64 samples_inserted = 4;
  int32 partition_start = 5;
  int32 partition_end = 6;
}
