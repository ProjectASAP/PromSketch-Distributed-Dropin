global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9101']
  - job_name: 'psksketch'
    static_configs:
      - targets:
        - 'localhost:8491'
        - 'localhost:8493'
        - 'localhost:8495'
  - job_name: 'pskinsert'
    static_configs:
      - targets: ['localhost:8480']
  - job_name: 'pskquery'
    static_configs:
      - targets: ['localhost:9100']
  - job_name: 'victoriametrics'
    static_configs:
      - targets: ['localhost:8428']
  - job_name: 'vmalert'
    static_configs:
      - targets: ['localhost:8880']
  - job_name: 'fake-exporter'
    static_configs:
      - targets: ['localhost:9102']

remote_write:
  - url: http://localhost:8480/api/v1/write
