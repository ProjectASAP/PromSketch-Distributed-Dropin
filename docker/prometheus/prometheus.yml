global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'promsketch-demo'

# Remote write to PromSketch-Dropin
remote_write:
  - url: http://promsketch-dropin:9100/api/v1/write
    queue_config:
      capacity: 10000
      max_shards: 10
      min_shards: 1
      max_samples_per_send: 500
      batch_send_deadline: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'fake-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['fake-exporter:8080']

  - job_name: 'promsketch-dropin'
    static_configs:
      - targets: ['promsketch-dropin:9100']

  - job_name: 'victoriametrics'
    static_configs:
      - targets: ['victoriametrics:8428']
