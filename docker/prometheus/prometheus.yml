global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'promsketch-demo'

# Remote write to PromSketch-Dropin
remote_write:
  - url: http://localhost:9100/api/v1/write
    queue_config:
      capacity: 10000
      max_shards: 10
      min_shards: 1
      max_samples_per_send: 500
      batch_send_deadline: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9101']
        labels:
          instance: 'demo-node'

  - job_name: 'promsketch-dropin'
    static_configs:
      - targets: ['localhost:9100']
