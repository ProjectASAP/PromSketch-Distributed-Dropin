version: '3.8'

services:
  # VictoriaMetrics - Backend storage
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoriametrics
    ports:
      - "8428:8428"
    volumes:
      - vmdata:/victoria-metrics-data
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--httpListenAddr=:8428"
      - "--retentionPeriod=12"
    networks:
      - promsketch

  # PromSketch-Dropin - Main service
  promsketch-dropin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promsketch-dropin
    ports:
      - "9100:9100"
    volumes:
      - ./configs/promsketch-dropin.example.yaml:/etc/promsketch/config.yaml:ro
    command:
      - "--config.file=/etc/promsketch/config.yaml"
    depends_on:
      - victoriametrics
    networks:
      - promsketch

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - promsketch-dropin
    networks:
      - promsketch

  # Fake Exporter - Synthetic Zipf-distributed metrics producer
  fake-exporter:
    build:
      context: ./docker/fake-exporter
      dockerfile: Dockerfile
    container_name: fake-exporter
    ports:
      - "8080:8080"
    command:
      - "--port=8080"
      - "--instancestart=0"
      - "--batchsize=1000"
    networks:
      - promsketch

  # Prometheus - Scraper (sends to PromSketch-Dropin via remote write)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - promsketch-dropin
      - fake-exporter
    networks:
      - promsketch

networks:
  promsketch:
    driver: bridge

volumes:
  vmdata:
  grafana-storage:
  prometheus-data:
